services:
  app:
    build: .
    container_name: laravel_app
    volumes:
      - ./:/var/www
    depends_on:
      - db

  web:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app

  db:
    image: postgres:15
    container_name: maquine_db
    restart: always
    environment:
      POSTGRES_DB: maquine
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
